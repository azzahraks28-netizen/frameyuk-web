<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ringkasan Pesanan - FrameYuk</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-light">

    <!-- Top Navigation Bar -->
    <header class="navbar-top">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <img src="logo.png" alt="FrameYuk Logo" class="logo-img">
            </a>
            <div class="user-profile">
                <div class="user-info">
                    <i class="fas fa-user-circle"></i>
                    <span>Halo, User</span>
                    <i class="fas fa-chevron-down"></i>
                </div>
                <div class="user-dropdown">
                    <ul>
                        <li><a href="profil.html"><i class="fas fa-user"></i> Profil</a></li>
                        <li><a href="pesanan.html"><i class="fas fa-shopping-bag"></i> Pesanan Saya</a></li>
                        <li><a href="notifikasi.html"><i class="fas fa-bell"></i> Notifikasi</a></li>
                        <li><a href="index.html" class="text-danger"><i class="fas fa-sign-out-alt"></i> Keluar</a></li>
                    </ul>
                </div>
            </div>
        </div>
    </header>

    <!-- Breadcrumb & Back -->
    <div class="breadcrumb">
        <div class="container" style="display:flex; justify-content:space-between; align-items:center; max-width: 1200px; margin: 0 auto;">
            <div>
                <a href="index.html">Beranda</a> &gt; <span>Ringkasan Pesanan</span>
            </div>
            <a href="javascript:history.back()" style="color: var(--primary-color); text-decoration: none; font-weight: 600; display: inline-flex; align-items: center; gap: 8px;">
                <i class="fas fa-arrow-left"></i> Kembali
            </a>
        </div>
    </div>

    <!-- Main Container -->
    <main class="container detail-container">
        <div class="detail-layout">
            <!-- Left Column: Frame Live Preview -->
            <div class="detail-gallery" id="summary-preview-slot" style="display:flex; justify-content:center; align-items:center; background:#eaeaea; background-image: radial-gradient(#d3d3d3 1px, transparent 1px); background-size: 16px 16px; padding:30px; border-radius:20px;">
                <!-- Dynamically Rendered Preview will go here -->
                <div style="color: var(--text-light); text-align:center; padding: 40px;">
                    <i class="fas fa-spinner fa-spin" style="font-size:2rem; margin-bottom:10px;"></i>
                    <p>Memuat preview order...</p>
                </div>
            </div>

            <!-- Right Column: Pricing details -->
            <div class="detail-info" id="summary-details-box">
                <!-- Dynamically Rendered Details table will go here -->
                <div style="color: var(--text-light); text-align:center; padding: 40px;">
                    <i class="fas fa-spinner fa-spin" style="font-size:2rem; margin-bottom:10px;"></i>
                    <p>Memuat rincian harga...</p>
                </div>
            </div>
        </div>
    </main>

    <!-- Simple Footer -->
    <footer class="footer-simple">
        <p>&copy; 2026 FrameYuk - Frame Digital. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
